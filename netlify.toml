[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[edge_functions]]
  function = "download"
  path = "/api/download"

# SPA fallback so client-side routes like /detail/123 and /search/query
# resolve to index.html instead of a 404. Functions with an explicit
# `path` (declared in their own config) are matched before this rule.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
